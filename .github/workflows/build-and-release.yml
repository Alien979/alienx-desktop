name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
          - platform: linux
            os: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            webkit2gtk-4.1 \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup macOS toolchain
        if: matrix.platform == 'macos'
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Build Tauri application
        run: npm run tauri:build

      - name: Collect Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          mkdir -p release-artifacts
          Get-ChildItem -Recurse "src-tauri/target/release/bundle" -Include @("*.msi", "*.exe") | Copy-Item -Destination "release-artifacts/"

      - name: Collect macOS artifacts
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          find "src-tauri/target/release/bundle" -type f \( -name "*.dmg" \) -exec cp {} release-artifacts/ \;

      - name: Collect Linux artifacts
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          find "src-tauri/target/release/bundle" -type f \( -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release-artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifacts
          path: release-artifacts/
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: List artifacts
        run: |
          echo "=== Collected Artifacts ==="
          ls -la all-artifacts/
          find all-artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          body: |
            🚀 **AlienX Desktop ${{ github.ref_name }}** Released!

            ## 📥 Downloads Available For
            - 🪟 Windows (MSI + EXE)
            - 🍎 macOS (Intel & Apple Silicon)
            - 🐧 Linux (AppImage)

            ## ✨ Features
            - ✅ Standalone execution
            - ✅ Cross-platform support
            - ✅ No dependencies required
            - ✅ Professional installers

            See [INSTALLATION_GUIDE.md](https://github.com/Alien979/alienx-desktop/blob/main/INSTALLATION_GUIDE.md) for setup instructions.
          files: |
            all-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
