name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: AlienX Desktop ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            # 🚀 AlienX Desktop ${{ github.ref_name }}

            ## 📥 Installation

            ### Windows
            Download and run the `.msi` or `.exe` installer from below.
            - MSI: Modern Windows installer format
            - EXE: Legacy NSIS installer
            Both work the same way, choose either version.

            ### macOS  
            Download the `.dmg` file and drag AlienX to Applications folder.
            Supports both Intel and Apple Silicon Macs.

            ### Linux
            Download the `.AppImage` and make it executable:
            ```bash
            chmod +x alienx*.AppImage
            ./alienx*.AppImage
            ```

            ## 🛠️ Build from Source

            If pre-built binaries aren't available:
            ```bash
            git clone https://github.com/Alien979/alienx-desktop.git
            cd alienx-desktop
            npm install
            npm run tauri:build
            ```

            Installers will be in: `src-tauri/target/release/bundle/`

            ### Requirements
            - Node.js 18+
            - Rust toolchain
            - Platform-specific tools (MSVC/Xcode/build-essential)

            ## ✨ Features
            - Forensic Windows event log analysis
            - SIGMA rule threat detection
            - YARA pattern matching
            - Timeline correlation
            - Excel/HTML report export
            - Offline processing

            ## 📖 Documentation
            - [Installation Guide](https://github.com/Alien979/alienx-desktop/blob/main/INSTALLATION_GUIDE.md)
            - [Quick Start](https://github.com/Alien979/alienx-desktop/blob/main/QUICK_START_BUILD.md)
            - [README](https://github.com/Alien979/alienx-desktop/blob/main/README.md)

            ## 🔒 Security
            - Windows: May show SmartScreen warning on first run (normal for new apps)
            - macOS: May require `xattr -d com.apple.quarantine` if Gatekeeper blocks
            - Linux: AppImage runs independently, no installation needed
