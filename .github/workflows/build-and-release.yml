name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Verify dependencies
        run: npm install

      - name: Verify build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          body: |
            🚀 **AlienX Desktop ${{ github.ref_name }}** Released!

            ## 📥 Installation

            ### Windows
            - Download the `.msi` or `.exe` installer from releases
            - Run the installer and follow prompts
            - Application will be available in Start Menu

            ### macOS
            - Download the `.dmg` file
            - Double-click to mount
            - Drag AlienX to Applications folder
            - Launch from Applications

            ### Linux
            - Download the `.AppImage` file
            - Run: `chmod +x alienx.AppImage && ./alienx.AppImage`

            ## 📦 Building from Source

            If platform-specific binaries are not yet available:

            \`\`\`bash
            git clone https://github.com/Alien979/alienx-desktop.git
            cd alienx-desktop
            npm install
            npm run tauri:build
            \`\`\`

            Installers will be created in `src-tauri/target/release/bundle/`

            ## 📋 Features
            - ✅ Standalone cross-platform application
            - ✅ Forensic event log analysis
            - ✅ SIGMA & YARA rule detection
            - ✅ Offline processing
            - ✅ Export reports to Excel/HTML

            ## 🔗 Resources
            - [Installation Guide](https://github.com/Alien979/alienx-desktop/blob/main/INSTALLATION_GUIDE.md)
            - [User Guide](https://github.com/Alien979/alienx-desktop/blob/main/README.md)
            - [Report Issues](https://github.com/Alien979/alienx-desktop/issues)

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
